name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          # Cross-compiled from the arm runner: the macos-13 intel runners are
          # retired (jobs queue forever), and Apple's SDK on the arm image
          # builds x86_64 natively via `--target`.
          - os: macos-latest
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # The dtolnay action adds the target to *stable*, but builds in the repo
      # use the rust-toolchain.toml PINNED toolchain, which rustup installs
      # without cross targets — the x86_64 build died with E0463 (missing
      # core). Add the target to whatever toolchain the repo directory
      # actually resolves to.
      - name: Add target to pinned toolchain
        run: rustup target add ${{ matrix.target }}

      - name: Build otto
        run: cargo build --release -p otto-cli --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          bin="target/${{ matrix.target }}/release/otto"
          out="otto-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          tar -czf "$out" -C "$(dirname "$bin")" otto
          echo "ASSET=$out" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: otto-${{ matrix.target }}
          path: ${{ env.ASSET }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
